<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guit95 Modern</title>
  </head>
  <body>

    <!-- Home screen — shown when hash is "" or "#/" -->
    <div id="home-view" hidden>
      <h1 class="home-title">Guit95 — Choose a song</h1>
      <div class="song-grid">
        <!-- 7 cards injected by main.ts renderHome() -->
      </div>
    </div>

    <!-- Player header — shown when a song is active -->
    <header id="header" hidden>
      <button id="back-to-home" type="button" class="chord-btn">&#8592; Library</button>
      <h1 id="song-title">—</h1>
      <select id="exercise-select">
        <option value="">Choose exercise…</option>
      </select>
      <div id="orientation-toggle">
        <button id="btn-vert" class="active">Vert</button>
        <button id="btn-horiz">Horiz</button>
      </div>
    </header>

    <!-- Main: video left, panel right -->
    <main id="main" hidden>
      <div id="video-pane">
        <video
          id="player"
          controls
        ></video>
        <div id="exercise-pane" hidden>
          <div class="ex-mini-header">
            <button id="ex-back" class="chord-btn" type="button">&#8592; Back</button>
            <span id="ex-title" class="ex-title">Exercise —</span>
            <div class="ex-nav">
              <button id="ex-prev" class="chord-btn" type="button">&#8592; Prev</button>
              <button id="ex-next" class="chord-btn" type="button">Next &#8594;</button>
            </div>
          </div>
          <video id="ex-video" controls></video>
          <div class="ex-bottom">
            <button id="ex-voice"  class="chord-btn" type="button">&#9654; Voice</button>
            <button id="ex-replay" class="chord-btn" type="button">&#9654; Video</button>
            <label class="ex-autoplay">
              <input id="ex-autoplay" type="checkbox" checked /> Auto-play
            </label>
          </div>
        </div>
      </div>

      <div id="side-panel">
        <div class="now-next">
          <div class="preview now">
            <div class="preview-label">Now</div>
            <div class="preview-name" id="now-name">—</div>
            <canvas id="now-canvas"></canvas>
          </div>
          <div class="preview next">
            <div class="preview-label">Next</div>
            <div class="preview-name" id="next-name">—</div>
            <canvas id="next-canvas"></canvas>
          </div>
        </div>
        <div class="all-chords" id="all-chords">
          <!-- chord buttons injected by main.ts -->
        </div>
      </div>
    </main>

    <!-- Playback controls: speed + A/B loop -->
    <div id="playback-controls" hidden>
      <label class="speed-control">
        <span class="ctrl-label">Speed</span>
        <input id="speed-slider" type="range" min="0.25" max="1.5" step="0.05" value="1" />
        <span id="speed-value" class="speed-value">1.00×</span>
        <div class="speed-presets">
          <button id="preset-50"  type="button" class="preset-btn" title="Half speed">0.5×</button>
          <button id="preset-75"  type="button" class="preset-btn" title="Three-quarter speed">0.75×</button>
          <button id="preset-100" type="button" class="preset-btn" title="Full speed">1×</button>
        </div>
      </label>
      <div class="loop-controls">
        <button id="loop-here"   type="button" class="loop-here-btn" title="Set 1-bar loop at cursor">🔁 Loop here</button>
        <button id="ab-a"        type="button" class="ab-btn">A —</button>
        <button id="ab-b"        type="button" class="ab-btn">B —</button>
        <button id="loop-toggle" type="button" class="loop-btn" disabled title="Toggle loop (L)">⟲ Loop</button>
        <button id="loop-clear"  type="button" class="loop-clear" title="Clear A/B (C)">✕</button>
      </div>
    </div>

    <!-- Tab scroller -->
    <div id="tab-row" hidden>
      <!-- TabScroller injects .tab-viewport here -->
      <div id="exercise-tab-row" hidden>
        <img id="exercise-tab-img" alt="Exercise tab" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
