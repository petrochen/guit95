<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guit95 — Hey Joe</title>
  </head>
  <body>

    <!-- Header -->
    <header id="header">
      <h1>Guit95 — Hey Joe</h1>
      <div id="orientation-toggle">
        <button id="btn-vert" class="active">Vert</button>
        <button id="btn-horiz">Horiz</button>
      </div>
    </header>

    <!-- Main: video left, panel right -->
    <main id="main">
      <div id="video-pane">
        <video
          id="player"
          src="/assets/heyjoe/hjoe.mp4"
          controls
        ></video>
      </div>

      <div id="side-panel">
        <div class="now-next">
          <div class="preview now">
            <div class="preview-label">Now</div>
            <div class="preview-name" id="now-name">—</div>
            <canvas id="now-canvas"></canvas>
          </div>
          <div class="preview next">
            <div class="preview-label">Next</div>
            <div class="preview-name" id="next-name">—</div>
            <canvas id="next-canvas"></canvas>
          </div>
        </div>
        <div class="all-chords" id="all-chords">
          <!-- 11 buttons injected by main.ts -->
        </div>
      </div>
    </main>

    <!-- Tab scroller -->
    <div id="tab-row">
      <!-- TabScroller injected by main.ts -->
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
